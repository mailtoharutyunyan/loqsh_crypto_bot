name: quantum-signals

on:
  schedule:
    # Every 15 min. ⚠ GitHub cron is best-effort and often runs 5–15 min late.
    # Match this to your timeframe: "*/15 * * * *" for 15m, "0 * * * *" for 1h, etc.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}          # manual "Run workflow" button for testing

concurrency:
  group: quantum-signals
  cancel-in-progress: false      # never run two copies at once (state.json race)

permissions:
  contents: write                # allow committing state.json back to the repo

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Compute & send signals
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python quantum_signals.py

      - name: Persist signal state
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name  "quantum-bot"
            git config user.email "quantum-bot@users.noreply.github.com"
            git add state.json
            git commit -m "update signal state [skip ci]"
            git push
          else
            echo "state unchanged"
          fi
